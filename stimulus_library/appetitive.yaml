# Appetitive internal states: food attraction and gustatory reward.
#
# Schema (see stimuli.py for the loader):
#   <name>:
#     label:    human-readable, used in the GIF title
#     category: appetitive | aversive | social | reward | punishment |
#               defensive | arousal | conflict
#     valence:  positive | negative | mixed | neutral
#     notes:    free text (citations welcome)
#     EITHER  primary: {select: ...}  [+ secondary: {select: ...}]   # 2-tier shorthand
#     OR      channels: [{rate_hz: <Hz>, select: ...}, ...]          # explicit N-channel
#     OR      compose: [<other stimulus name>, ...]                  # union of stimuli
#
#   select keys:
#     types: [cell_type, ...]            exact cell_type match
#     ids:   [root_id, ...]              explicit FlyWire root_ids
#     cell_type_contains: <substring>    substring match on cell_type
#     <annotation column>: [values, ...] e.g. cell_class, super_class, top_nt, side
#   Within one select, different keys are AND-ed; lists within a key are OR-ed.

food_odor_vinegar:
  label: Food odor (vinegar-like)
  category: appetitive
  valence: positive
  notes: |
    Or42b/Or92a glomeruli (DM1/VA2) drive innate attraction; DM4/DM5 are
    recruited at higher concentration (Semmelhack & Wang 2009; Root et al. 2009).
  primary:
    select: { types: [ORN_DM1, ORN_VA2] }
  secondary:
    select: { types: [ORN_DM4, ORN_DM5] }

